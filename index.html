<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#58cc02" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <title>AvtoTest — Haydovchilik guvohnomasi testlari</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // apply theme before paint — Telegram overrides localStorage
      try {
        var tg = window.Telegram && window.Telegram.WebApp;
        var dark = tg ? tg.colorScheme === "dark"
          : (localStorage.getItem("avtotest-theme") === "dark" ||
             (!localStorage.getItem("avtotest-theme") && matchMedia("(prefers-color-scheme: dark)").matches));
        if (dark) document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
